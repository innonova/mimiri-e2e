name: e2e

on:
  workflow_dispatch:
    inputs:
      channel:
        description: "Channel or version to test (stable | canary | x.y.z)"
        required: false
        default: "canary"
  schedule:
    # daily, catches new canary/stable publishes
    - cron: "0 6 * * *"
  push:
    branches: [main]

jobs:
  smoke:
    strategy:
      fail-fast: false
      matrix:
        # macos pinned during the macos-latest 15→26 migration (runner-images#14167)
        os: [windows-latest, ubuntu-latest, macos-26]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Allow unprivileged user namespaces (Electron sandbox)
        if: runner.os == 'Linux'
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0

      - name: Install native dialog stack (Linux)
        if: runner.os == 'Linux'
        run: bash scripts/setup-linux-dialogs.sh

      - name: Fetch app build
        run: npm run fetch -- ${{ github.event.inputs.channel || 'canary' }}

      - name: Run tests (Linux)
        if: runner.os == 'Linux'
        # Wraps the run in Xvfb + openbox + a private D-Bus session with
        # xdg-desktop-portal, so the export/import tests can drive real portal
        # file dialogs. The smoke tests run unchanged under it.
        run: bash scripts/run-with-dialogs.sh npm test

      - name: Run tests (Windows, macOS)
        if: runner.os != 'Linux'
        run: npm test

      - name: Upload report on failure
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report-${{ matrix.os }}
          path: |
            playwright-report/
            test-results/
          retention-days: 7
