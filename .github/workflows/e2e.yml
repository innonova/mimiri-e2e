name: e2e

on:
  workflow_dispatch:
    inputs:
      channel:
        description: "Channel or version to test (stable | canary | x.y.z)"
        required: false
        default: "canary"
  schedule:
    # daily, catches new canary/stable publishes
    - cron: "0 6 * * *"
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    strategy:
      fail-fast: false
      matrix:
        # macos pinned during the macos-latest 15→26 migration (runner-images#14167)
        # Linux runs once per package format from the update feed, on both
        # amd64 (ubuntu-latest) and arm64 (ubuntu-24.04-arm) runners.
        include:
          - os: windows-latest
          - os: macos-26
          - os: ubuntu-latest
            format: targz
          - os: ubuntu-latest
            format: flatpak
          - os: ubuntu-latest
            format: appimage
          - os: ubuntu-latest
            format: snap
          - os: ubuntu-24.04-arm
            format: targz
          - os: ubuntu-24.04-arm
            format: flatpak
          - os: ubuntu-24.04-arm
            format: appimage
          - os: ubuntu-24.04-arm
            format: snap
    runs-on: ${{ matrix.os }}
    name: smoke (${{ matrix.os }}${{ matrix.format && format(', {0}', matrix.format) || '' }})
    env:
      APP_FORMAT: ${{ matrix.format || 'targz' }}
      # The nightly runs without retries so timing races fail loudly on a
      # schedule; pushes/PRs keep the retry cushion (empty string = default).
      MIMIRI_RETRIES: ${{ github.event_name == 'schedule' && '0' || '' }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Allow unprivileged user namespaces (Electron sandbox)
        if: runner.os == 'Linux'
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0

      - name: Install native dialog stack (Linux)
        if: runner.os == 'Linux'
        run: bash scripts/setup-linux-dialogs.sh ${{ matrix.format || 'targz' }}

      - name: Fetch app build
        run: npm run fetch -- ${{ github.event.inputs.channel || 'canary' }} --format=${{ matrix.format || 'targz' }}

      - name: Run tests (Linux)
        if: runner.os == 'Linux'
        # Wraps the run in Xvfb + openbox + a private D-Bus session with
        # xdg-desktop-portal, so the export/import tests can drive real portal
        # file dialogs. The smoke tests run unchanged under it.
        run: bash scripts/run-with-dialogs.sh npm test

      - name: Run tests (Windows, macOS)
        if: runner.os != 'Linux'
        run: npm test

      - name: Upload report on failure
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report-${{ matrix.os }}${{ matrix.format && format('-{0}', matrix.format) || '' }}
          path: |
            playwright-report/
            test-results/
          retention-days: 7
